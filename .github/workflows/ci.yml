name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Engine tests & typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Use Node.js 20 ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install root dependencies 🔧
        run: npm ci

      - name: Run engine tests 🧪
        run: npm run test -- run

  frontend-build:
    name: Frontend typecheck & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Use Node.js 20 ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build 🔧
        run: |
          cd frontend
          npm ci
          npm run build
